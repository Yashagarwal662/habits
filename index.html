<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Habits">
<title>Habits</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #0c0c0c;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --accent: #7c6af7;
    --accent-dim: #2d2657;
    --accent-glow: rgba(124,106,247,0.15);
    --text: #f0f0f0;
    --text-mid: #888;
    --text-dim: #444;
    --done-text: #c4bbff;
    --green: #4ade80;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    min-height: 100vh;
    max-width: 430px;
    margin: 0 auto;
    padding: calc(var(--safe-top) + 20px) 20px calc(var(--safe-bottom) + 100px);
    overflow-x: hidden;
  }

  /* HEADER */
  .header { margin-bottom: 28px; }
  .header-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
  .label-eyebrow { font-size: 10px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; }
  .header-title { font-size: 28px; font-weight: 700; color: var(--text); line-height: 1.15; }
  .header-date { font-size: 13px; color: var(--text-dim); margin-top: 5px; }

  /* RING */
  .ring-wrap { position: relative; width: 64px; height: 64px; flex-shrink: 0; }
  .ring-wrap svg { transform: rotate(-90deg); }
  .ring-label { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .ring-pct { font-size: 14px; font-weight: 800; color: var(--accent); line-height: 1; }
  .ring-sub { font-size: 8px; color: var(--text-dim); margin-top: 1px; letter-spacing: 0.05em; }

  /* NAV */
  .nav { display: flex; gap: 3px; background: var(--surface); border-radius: 12px; padding: 4px; margin-bottom: 24px; }
  .nav-btn { flex: 1; padding: 9px 0; border-radius: 9px; border: none; cursor: pointer; font-size: 12px; font-weight: 600; background: transparent; color: var(--text-dim); transition: all 0.18s; letter-spacing: 0.01em; }
  .nav-btn.active { background: var(--accent); color: #fff; }

  /* HABIT CARDS */
  .habit-list { display: flex; flex-direction: column; gap: 10px; }

  .habit-card {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 16px; border-radius: 16px; border: none; cursor: pointer; width: 100%;
    background: var(--surface); border-left: 3px solid var(--border);
    transition: all 0.2s; text-align: left;
    -webkit-user-select: none; user-select: none;
  }
  .habit-card.done {
    background: linear-gradient(135deg, #1c1830, #161428);
    border-left-color: var(--accent);
  }
  .habit-card:active { transform: scale(0.98); }

  .habit-left { display: flex; align-items: center; gap: 13px; }
  .habit-icon { font-size: 24px; line-height: 1; }
  .habit-name { font-size: 15px; font-weight: 600; color: var(--text-mid); line-height: 1.2; }
  .habit-card.done .habit-name { color: var(--done-text); }
  .habit-streak { font-size: 11px; color: var(--accent); margin-top: 3px; }

  .habit-check {
    width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
    background: var(--surface2); border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; font-weight: 700; color: transparent;
    transition: all 0.2s;
  }
  .habit-card.done .habit-check { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* MONTH BARS */
  .month-section { margin-top: 24px; background: var(--surface); border-radius: 16px; padding: 18px; }
  .section-label { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 14px; }
  .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .bar-icon { font-size: 15px; width: 22px; }
  .bar-track { flex: 1; height: 5px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
  .bar-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.5s ease; }
  .bar-count { font-size: 11px; color: var(--text-dim); width: 36px; text-align: right; }

  /* HEATMAP */
  .heatmap-wrap { overflow-x: auto; padding-bottom: 4px; }
  .heatmap-table { border-collapse: collapse; }
  .heatmap-table td { padding: 0 2px 6px; }
  .heatmap-cell { width: 20px; height: 20px; border-radius: 5px; }
  .heatmap-head { font-size: 9px; color: var(--text-dim); text-align: center; padding-bottom: 8px !important; }
  .habit-row-label { font-size: 11px; color: var(--text-dim); padding-right: 10px !important; white-space: nowrap; }

  .best-days { display: flex; flex-wrap: wrap; gap: 4px; }
  .day-dot { width: 24px; height: 24px; border-radius: 5px; }

  /* SETTINGS */
  .setting-row { display: flex; align-items: center; gap: 12px; padding: 14px 16px; background: var(--surface); border-radius: 14px; margin-bottom: 10px; }
  .setting-icon { font-size: 20px; width: 28px; text-align: center; }
  .setting-name { flex: 1; font-size: 14px; color: var(--text-mid); }
  .rename-btn { background: transparent; border: 1px solid var(--border); color: var(--text-dim); border-radius: 8px; padding: 5px 12px; cursor: pointer; font-size: 11px; font-weight: 600; }
  .rename-input { flex: 1; background: var(--surface2); border: 1px solid var(--accent); color: var(--text); border-radius: 8px; padding: 7px 10px; font-size: 13px; outline: none; font-family: inherit; }
  .save-btn { background: var(--accent); border: none; color: #fff; border-radius: 8px; padding: 7px 14px; cursor: pointer; font-size: 12px; font-weight: 700; }
  .cancel-btn { background: var(--surface2); border: none; color: var(--text-dim); border-radius: 8px; padding: 7px 10px; cursor: pointer; font-size: 12px; }
  .delete-btn { background: transparent; border: 1px solid #3a1a1a; color: #c0504d; border-radius: 8px; padding: 5px 10px; cursor: pointer; font-size: 11px; font-weight: 600; }

  /* ADD HABIT FORM */
  .add-form { background: var(--surface); border-radius: 16px; padding: 16px; margin-bottom: 10px; border: 1px dashed var(--border); }
  .add-form-title { font-size: 12px; font-weight: 700; color: var(--text-dim); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 12px; }
  .add-row { display: flex; gap: 8px; margin-bottom: 10px; }
  .emoji-input { width: 52px; background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 10px; padding: 9px 6px; font-size: 20px; text-align: center; outline: none; cursor: pointer; }
  .label-input { flex: 1; background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 10px; padding: 9px 12px; font-size: 14px; outline: none; font-family: inherit; }
  .label-input:focus, .emoji-input:focus { border-color: var(--accent); }
  .add-btn { width: 100%; background: var(--accent); border: none; color: #fff; border-radius: 10px; padding: 10px; cursor: pointer; font-size: 14px; font-weight: 700; }
  .add-trigger { width: 100%; background: transparent; border: 1px dashed var(--border); color: var(--text-dim); border-radius: 12px; padding: 12px; cursor: pointer; font-size: 13px; font-weight: 600; margin-bottom: 10px; }
  .add-trigger:active { background: var(--surface2); }

  /* EMOJI GRID */
  .emoji-grid { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
  .emoji-option { width: 38px; height: 38px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .emoji-option.selected { border-color: var(--accent); background: var(--accent-dim); }

  /* TOAST */
  .toast {
    position: fixed; top: calc(var(--safe-top) + 16px); left: 50%; transform: translateX(-50%) translateY(-80px);
    background: var(--surface); border: 1px solid var(--accent); color: var(--accent);
    padding: 9px 22px; border-radius: 20px; font-size: 13px; font-weight: 600;
    z-index: 999; transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1); pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* INSTALL BANNER */
  .install-banner {
    background: var(--accent-dim); border: 1px solid var(--accent);
    border-radius: 14px; padding: 14px 16px; margin-bottom: 20px; display: none;
  }
  .install-banner.visible { display: block; }
  .install-title { font-size: 13px; font-weight: 700; color: var(--done-text); margin-bottom: 4px; }
  .install-text { font-size: 12px; color: var(--text-mid); line-height: 1.5; }
  .install-steps { font-size: 12px; color: var(--text-mid); margin-top: 6px; line-height: 1.8; }
  .install-close { float: right; background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 16px; margin-left: 8px; }
</style>
</head>
<body>

<div class="install-banner" id="installBanner">
  <button class="install-close" onclick="dismissInstall()">✕</button>
  <div class="install-title">📲 Add to Home Screen</div>
  <div class="install-text">Save this page as an app for one-tap access every day:</div>
  <div class="install-steps">
    1. Tap the <strong>Share</strong> button (box with arrow) in Safari<br>
    2. Scroll down → tap <strong>"Add to Home Screen"</strong><br>
    3. Tap <strong>Add</strong> — done ✓
  </div>
</div>

<div class="header">
  <div class="label-eyebrow">Daily Tracker</div>
  <div class="header-top">
    <div>
      <div class="header-title" id="headerTitle">Loading…</div>
      <div class="header-date" id="headerDate"></div>
    </div>
    <div class="ring-wrap">
      <svg width="64" height="64" viewBox="0 0 64 64">
        <circle cx="32" cy="32" r="26" fill="none" stroke="#1e1e1e" stroke-width="5"/>
        <circle id="ringArc" cx="32" cy="32" r="26" fill="none" stroke="#7c6af7" stroke-width="5"
          stroke-dasharray="0 163.4" stroke-linecap="round"/>
      </svg>
      <div class="ring-label">
        <div class="ring-pct" id="ringPct">0%</div>
        <div class="ring-sub">today</div>
      </div>
    </div>
  </div>
</div>

<div class="nav">
  <button class="nav-btn active" onclick="setView('today')" id="nav-today">Today</button>
  <button class="nav-btn" onclick="setView('history')" id="nav-history">30 Days</button>
  <button class="nav-btn" onclick="setView('settings')" id="nav-settings">Habits</button>
</div>

<div id="view-today"></div>
<div id="view-history" style="display:none"></div>
<div id="view-settings" style="display:none"></div>

<div class="toast" id="toast"></div>

<script>
// ─── DATA ───────────────────────────────────────────────
const DEFAULT_HABITS = [
  { id: 'workout', label: 'Workout / Exercise', icon: '💪' },
  { id: 'reading', label: 'Reading', icon: '📖' },
  { id: 'diet', label: 'Diet / No Junk Food', icon: '🥗' },
  { id: 'alcohol', label: 'No Alcohol', icon: '🚫' },
  { id: 'bad1', label: 'Bad Habit #1', icon: '⚡' },
];

function load() {
  try {
    const raw = localStorage.getItem('habit-tracker-v1');
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return { habits: DEFAULT_HABITS, logs: {} };
}

function save(data) {
  try { localStorage.setItem('habit-tracker-v1', JSON.stringify(data)); } catch(e) {}
}

let data = load();

function todayKey() {
  return new Date().toISOString().split('T')[0];
}

function last30() {
  const days = [];
  for (let i = 29; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    days.push(d.toISOString().split('T')[0]);
  }
  return days;
}

function getStreak(habitId) {
  let streak = 0;
  const today = todayKey();
  const days = last30().reverse();
  for (let d of days) {
    if (d === today) continue;
    if (data.logs[d]?.[habitId]) streak++;
    else break;
  }
  return streak;
}

function getMonthCount(habitId) {
  return last30().filter(d => data.logs[d]?.[habitId]).length;
}

function dayScore(dateStr) {
  if (!data.logs[dateStr]) return 0;
  return data.habits.filter(h => data.logs[dateStr][h.id]).length;
}

// ─── VIEWS ──────────────────────────────────────────────
let currentView = 'today';

function setView(v) {
  currentView = v;
  ['today','history','settings'].forEach(name => {
    document.getElementById('view-' + name).style.display = name === v ? 'block' : 'none';
    document.getElementById('nav-' + name).classList.toggle('active', name === v);
  });
  if (v === 'today') renderToday();
  if (v === 'history') renderHistory();
  if (v === 'settings') renderSettings();
}

function renderAll() {
  updateHeader();
  if (currentView === 'today') renderToday();
  if (currentView === 'history') renderHistory();
  if (currentView === 'settings') renderSettings();
}

function updateHeader() {
  const today = todayKey();
  const todayLog = data.logs[today] || {};
  const done = data.habits.filter(h => todayLog[h.id]).length;
  const total = data.habits.length;
  const pct = Math.round((done / total) * 100);
  const circumference = 163.4;
  const arc = (done / total) * circumference;

  document.getElementById('ringArc').setAttribute('stroke-dasharray', `${arc} ${circumference}`);
  document.getElementById('ringPct').textContent = pct + '%';

  if (done === total) {
    document.getElementById('headerTitle').textContent = 'Perfect day 🔥';
  } else {
    document.getElementById('headerTitle').textContent = `${done} of ${total} done`;
  }

  const dateStr = new Date().toLocaleDateString('en-IN', { weekday: 'long', day: 'numeric', month: 'long' });
  document.getElementById('headerDate').textContent = dateStr;
}

function renderToday() {
  const today = todayKey();
  const todayLog = data.logs[today] || {};
  let html = '<div class="habit-list">';

  data.habits.forEach(h => {
    const done = !!todayLog[h.id];
    const streak = getStreak(h.id);
    html += `
      <button class="habit-card ${done ? 'done' : ''}" onclick="toggle('${h.id}')">
        <div class="habit-left">
          <span class="habit-icon">${h.icon}</span>
          <div>
            <div class="habit-name">${h.label}</div>
            ${streak > 0 ? `<div class="habit-streak">🔥 ${streak} day streak</div>` : ''}
          </div>
        </div>
        <div class="habit-check">${done ? '✓' : ''}</div>
      </button>`;
  });

  html += '</div>';

  // Month bars
  html += `<div class="month-section"><div class="section-label">This Month</div>`;
  data.habits.forEach(h => {
    const count = getMonthCount(h.id);
    const pct = Math.round((count / 30) * 100);
    html += `<div class="bar-row">
      <span class="bar-icon">${h.icon}</span>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
      <div class="bar-count">${count}/30</div>
    </div>`;
  });
  html += '</div>';

  document.getElementById('view-today').innerHTML = html;
}

function toggle(habitId) {
  const today = todayKey();
  if (!data.logs[today]) data.logs[today] = {};
  data.logs[today][habitId] = !data.logs[today][habitId];
  save(data);
  const done = data.logs[today][habitId];
  showToast(done ? '✓ Logged!' : 'Unmarked');
  renderAll();
}

function renderHistory() {
  const days = last30();
  const today = todayKey();
  const recent14 = days.slice(-14);

  let html = `<div style="font-size:12px;color:var(--text-dim);margin-bottom:16px">Last 14 days · each column = one day</div>`;
  html += `<div class="heatmap-wrap"><table class="heatmap-table"><thead><tr><td style="width:80px"></td>`;
  recent14.forEach(d => {
    const day = new Date(d + 'T00:00:00').getDate();
    html += `<td class="heatmap-head">${day}</td>`;
  });
  html += `</tr></thead><tbody>`;

  data.habits.forEach(h => {
    html += `<tr><td class="habit-row-label">${h.icon} ${h.label.split(' ')[0]}</td>`;
    recent14.forEach(d => {
      const done = !!data.logs[d]?.[h.id];
      const isToday = d === today;
      const bg = done ? 'var(--accent)' : 'var(--surface2)';
      const border = isToday ? '2px solid #a78bfa' : 'none';
      html += `<td><div class="heatmap-cell" style="background:${bg};border:${border}"></div></td>`;
    });
    html += '</tr>';
  });
  html += '</tbody></table></div>';

  // Full 30-day dot grid
  html += `<div class="month-section" style="margin-top:20px">
    <div class="section-label">Full 30 Days</div>
    <div class="best-days">`;
  days.forEach(d => {
    const score = dayScore(d);
    const alpha = score === 0 ? 0.08 : (score / data.habits.length);
    const isToday = d === today;
    const dateLabel = new Date(d + 'T00:00:00').toLocaleDateString('en-IN', { day: 'numeric', month: 'short' });
    html += `<div class="day-dot" title="${dateLabel}: ${score}/${data.habits.length}"
      style="background:rgba(124,106,247,${alpha});${isToday ? 'border:2px solid #a78bfa' : ''}"></div>`;
  });
  html += `</div><div style="font-size:10px;color:var(--text-dim);margin-top:10px">Darker = more habits done · bordered = today</div></div>`;

  document.getElementById('view-history').innerHTML = html;
}

let editingId = null;
let showingAddForm = false;
let selectedEmoji = '⭐';

const EMOJI_OPTIONS = ['💪','📖','🥗','🚫','⚡','🧘','😴','💧','🏃','✍️','🎯','💊','🚶','🍎','📵','☀️','🧠','💰','🎸','🌿'];

function renderSettings() {
  let html = '';

  // Add button always at top, very visible
  if (showingAddForm) {
    html += `<div class="add-form">
      <div class="add-form-title">New Habit</div>
      <div style="font-size:11px;color:var(--text-dim);margin-bottom:8px">Pick an emoji</div>
      <div class="emoji-grid">`;
    EMOJI_OPTIONS.forEach(e => {
      html += `<button class="emoji-option ${e === selectedEmoji ? 'selected' : ''}" onclick="selectEmoji('${e}')">${e}</button>`;
    });
    html += `</div>
      <div class="add-row">
        <input class="label-input" id="new-habit-label" placeholder="e.g. No phone after 10pm" onkeydown="if(event.key==='Enter')addHabit()">
      </div>
      <div style="display:flex;gap:8px">
        <button class="add-btn" onclick="addHabit()" style="flex:1">Add Habit</button>
        <button class="cancel-btn" onclick="toggleAddForm()" style="padding:10px 16px">Cancel</button>
      </div>
    </div>`;
  } else {
    html += `<button class="add-trigger" onclick="toggleAddForm()" style="background:var(--accent-dim);border:1.5px solid var(--accent);color:var(--done-text);font-size:14px;font-weight:700;padding:14px;border-radius:14px;margin-bottom:16px">＋ Add a new habit</button>`;
  }

  html += `<div style="font-size:11px;color:var(--text-dim);margin-bottom:12px">Your habits</div>`;

  data.habits.forEach(h => {
    if (editingId === h.id) {
      html += `<div class="setting-row">
        <span class="setting-icon">${h.icon}</span>
        <input class="rename-input" id="input-${h.id}" value="${h.label}" onkeydown="if(event.key==='Enter')saveLabel('${h.id}')">
        <button class="save-btn" onclick="saveLabel('${h.id}')">Save</button>
        <button class="cancel-btn" onclick="cancelEdit()">✕</button>
      </div>`;
    } else {
      html += `<div class="setting-row">
        <span class="setting-icon">${h.icon}</span>
        <span class="setting-name">${h.label}</span>
        <button class="rename-btn" onclick="startEdit('${h.id}')" style="margin-right:4px">Rename</button>
        ${data.habits.length > 1 ? `<button class="delete-btn" onclick="deleteHabit('${h.id}')">✕</button>` : ''}
      </div>`;
    }
  });

  html += `<div style="margin-top:16px;padding:14px 16px;background:var(--surface);border-radius:14px;font-size:12px;color:var(--text-dim);line-height:1.7">
    💾 Data saves automatically to this device<br>
    📲 Add to Home Screen for one-tap access<br>
    🔄 Data stays here even after closing Safari
  </div>`;

  document.getElementById('view-settings').innerHTML = html;

  if (editingId) {
    const input = document.getElementById('input-' + editingId);
    if (input) { input.focus(); input.select(); }
  }
  if (showingAddForm) {
    const input = document.getElementById('new-habit-label');
    if (input) setTimeout(() => input.focus(), 50);
  }
}

function startEdit(id) { editingId = id; showingAddForm = false; renderSettings(); }
function cancelEdit() { editingId = null; renderSettings(); }
function saveLabel(id) {
  const input = document.getElementById('input-' + id);
  if (!input) return;
  const val = input.value.trim();
  if (!val) return;
  data.habits = data.habits.map(h => h.id === id ? { ...h, label: val } : h);
  save(data);
  editingId = null;
  showToast('Habit updated ✓');
  renderSettings();
}

function toggleAddForm() {
  showingAddForm = !showingAddForm;
  editingId = null;
  selectedEmoji = '⭐';
  renderSettings();
}

function selectEmoji(e) {
  selectedEmoji = e;
  renderSettings();
}

function addHabit() {
  const input = document.getElementById('new-habit-label');
  const label = input ? input.value.trim() : '';
  if (!label) { showToast('Enter a habit name'); return; }
  const id = 'habit_' + Date.now();
  data.habits.push({ id, label, icon: selectedEmoji });
  save(data);
  showingAddForm = false;
  selectedEmoji = '⭐';
  showToast('Habit added ✓');
  renderSettings();
}

function deleteHabit(id) {
  if (data.habits.length <= 1) return;
  data.habits = data.habits.filter(h => h.id !== id);
  save(data);
  showToast('Habit removed');
  renderAll();
}

// ─── TOAST ──────────────────────────────────────────────
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1800);
}

// ─── INSTALL BANNER ─────────────────────────────────────
function checkInstallBanner() {
  const dismissed = localStorage.getItem('install-dismissed');
  const isStandalone = window.navigator.standalone;
  if (!dismissed && !isStandalone) {
    document.getElementById('installBanner').classList.add('visible');
  }
}
function dismissInstall() {
  localStorage.setItem('install-dismissed', '1');
  document.getElementById('installBanner').classList.remove('visible');
}

// ─── INIT ────────────────────────────────────────────────
checkInstallBanner();
renderAll();
</script>
</body>
</html>
